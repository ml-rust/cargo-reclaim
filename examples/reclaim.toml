version = 1
roots = ["projects"]
ignore = ["projects/pinned"]
skip = ["projects/vendor"]

[policy]
mode = "conservative"
whole_target = "off"
allow_unattended_whole_target_delete = false
keep_recent_projects = "3 days"
max_target_size = "5 GiB"
target_size_goal = "4 GiB"
unattended_allowed = false

[scanner]
follow_symlinks = true
allow_name_only_targets = true
cross_filesystems = true

[planner]
recent_write_keep_window = "4h"
sweep_older_than = "24h"
keep_size = "64 MiB"
keep_rustc_hashes = []
keep_installed_toolchains = false
keep_toolchains = []

[scheduler]
at = "04:15"
mode = "observe"
policy = "conservative"
allow_unattended_cleanup = false
allow_unattended_high_policy = false
state_dir = "state"
log_dir = "logs"

[background]
enabled = false
target_free_disk = "30 GiB"

# Routine cadence: fires every 30m with no limiter, so it always cleans.
[background.periodic]
every = "30m"

# Responsive gate: polls every 5m and, when free space is low, escalates to the
# `sweep` policy so cold final binaries are reclaimed too.
[background.trigger]
every = "5m"
policy = "sweep"
disk_free_below = "12.5%"
min_free_disk = "20 GiB"
