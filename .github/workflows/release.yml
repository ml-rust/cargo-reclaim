name: Release
run-name: Release ${{ inputs.tag }}

# Manual publish/release workflow. Push a release tag first; release-prepare.yml
# will run the full test matrix and build binary artifacts. Then run this
# workflow with the same tag and the successful prepare workflow run ID to publish
# crates.io and create the GitHub Release without rebuilding.
#
# Required release configuration:
#   - set `package.version` in Cargo.toml to the intended stable base version
#   - add a `CARGO_REGISTRY_TOKEN` secret (Environment: crates.io)
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.2.0"
        required: true
        type: string
      prepare_run_id:
        description: "Successful Release Prepare workflow run ID containing binary artifacts"
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-version:
    name: Validate version tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      changelog_version: ${{ steps.version.outputs.changelog_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Validate tag against package version
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          TAG_VERSION="${TAG#v}"
          CARGO_VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "cargo-reclaim") | .version')

          echo "Tag version:        $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"

          if [[ ! "$TAG_VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)(-[a-zA-Z]+\.[0-9]+)?$ ]]; then
            echo "::error::Invalid tag '$TAG'. Expected vX.Y.Z or vX.Y.Z-label.N"
            exit 1
          fi
          TAG_BASE="${BASH_REMATCH[1]}"
          CARGO_BASE=$(echo "$CARGO_VERSION" | grep -oP '^\d+\.\d+\.\d+')
          if [[ "$TAG_BASE" != "$CARGO_BASE" ]]; then
            echo "::error::Tag base '$TAG_BASE' != Cargo.toml version '$CARGO_BASE'"
            exit 1
          fi

          if [[ "$TAG_VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "changelog_version=$TAG_BASE" >> "$GITHUB_OUTPUT"
      - name: Require matching changelog section
        run: |
          CHANGELOG_VERSION="${{ steps.version.outputs.changelog_version }}"

          if [[ ! -f CHANGELOG.md ]]; then
            echo "::error::CHANGELOG.md is required for releases"
            exit 1
          fi

          awk -v version="$CHANGELOG_VERSION" '
            $0 ~ "^## \\[" version "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/changelog-section.md

          if [[ ! -s /tmp/changelog-section.md ]]; then
            echo "::error::CHANGELOG.md must contain a non-empty section for [$CHANGELOG_VERSION]"
            exit 1
          fi

  publish-crate:
    name: Publish to crates.io
    needs: validate-version
    runs-on: ubuntu-latest
    environment: crates.io
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-version.outputs.tag }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Stamp version
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" Cargo.toml
          # Keep --locked publish valid after stamping prerelease tag versions.
          cargo generate-lockfile
          echo "Stamped package version to $VERSION"
      - name: Publish cargo-reclaim
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          is_published() {
            curl -sf -H "User-Agent: cargo-reclaim-ci (github.com/ml-rust/cargo-reclaim)" \
              "https://crates.io/api/v1/crates/cargo-reclaim/$VERSION" > /dev/null 2>&1
          }

          if is_published; then
            echo "cargo-reclaim@$VERSION already published — skipping"
          else
            cargo publish --allow-dirty --no-verify --locked
          fi

  github-release:
    name: Create GitHub Release
    needs: [validate-version, publish-crate]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-version.outputs.tag }}
          fetch-depth: 0
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ inputs.prepare_run_id }}
          github-token: ${{ github.token }}
          path: ./artifacts
          pattern: binaries-*
          merge-multiple: true
      - name: Build release notes from changelog
        run: |
          TAG="${{ needs.validate-version.outputs.tag }}"
          CHANGELOG_VERSION="${{ needs.validate-version.outputs.changelog_version }}"
          PREVIOUS_TAG=$(git tag --sort=-v:refname 'v*' | grep -v "^${TAG}$" | head -n 1 || true)

          awk -v version="$CHANGELOG_VERSION" '
            $0 ~ "^## \\[" version "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/changelog-section.md

          if [[ ! -s /tmp/changelog-section.md ]]; then
            echo "::error::CHANGELOG.md must contain a non-empty section for [$CHANGELOG_VERSION]"
            exit 1
          fi

          {
            echo "## Changelog"
            cat /tmp/changelog-section.md
            echo
            echo "## Diff"
            echo
            if [[ -n "$PREVIOUS_TAG" ]]; then
              echo "https://github.com/ml-rust/cargo-reclaim/compare/${PREVIOUS_TAG}...${TAG}"
            else
              echo "https://github.com/ml-rust/cargo-reclaim/tree/${TAG}"
            fi
          } > /tmp/release-notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate-version.outputs.tag }}
          name: cargo-reclaim ${{ needs.validate-version.outputs.version }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ needs.validate-version.outputs.is_prerelease == 'true' }}
          files: artifacts/*
          fail_on_unmatched_files: true
