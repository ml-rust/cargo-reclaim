name: Release
run-name: Release ${{ github.ref_name }}

# Tag-driven release. Push a tag `vX.Y.Z` (or a prerelease `vX.Y.Z-label.N`)
# whose base version matches `package.version` in Cargo.toml. One synced
# version drives the crates.io publish and the GitHub Release binaries.
#
# Required configuration before the first real release:
#   - set `package.version` in Cargo.toml to the intended stable base version
#   - add a `CARGO_REGISTRY_TOKEN` secret (Environment: crates.io)
on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-version:
    name: Validate version tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Validate tag against package version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          CARGO_VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "cargo-reclaim") | .version')

          echo "Tag version:        $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"

          if [[ ! "$TAG_VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)(-[a-zA-Z]+\.[0-9]+)?$ ]]; then
            echo "::error::Invalid tag '$TAG'. Expected vX.Y.Z or vX.Y.Z-label.N"
            exit 1
          fi
          TAG_BASE="${BASH_REMATCH[1]}"
          CARGO_BASE=$(echo "$CARGO_VERSION" | grep -oP '^\d+\.\d+\.\d+')
          if [[ "$TAG_BASE" != "$CARGO_BASE" ]]; then
            echo "::error::Tag base '$TAG_BASE' != Cargo.toml version '$CARGO_BASE'"
            exit 1
          fi

          if [[ "$TAG_VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  ci:
    name: CI gate
    needs: validate-version
    uses: ./.github/workflows/test.yml

  publish-crate:
    name: Publish to crates.io
    needs: [validate-version, ci]
    runs-on: ubuntu-latest
    environment: crates.io
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Stamp version
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" Cargo.toml
          # Keep --locked publish valid after stamping prerelease tag versions.
          cargo generate-lockfile
          echo "Stamped package version to $VERSION"
      - name: Publish cargo-reclaim
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          is_published() {
            curl -sf -H "User-Agent: cargo-reclaim-ci (github.com/ml-rust/cargo-reclaim)" \
              "https://crates.io/api/v1/crates/cargo-reclaim/$VERSION" > /dev/null 2>&1
          }

          if is_published; then
            echo "cargo-reclaim@$VERSION already published — skipping"
          else
            cargo publish --allow-dirty --no-verify --locked
          fi

  build-binaries:
    name: Build (${{ matrix.label }})
    needs: validate-version
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - runs-on: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            label: linux-arm64
            cross: true
          - runs-on: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - runs-on: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.target }}
      - name: Stamp version
        shell: bash
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          perl -i -pe "if (!\$done && /^version = \"/) { s/^version = \".*\"/version = \"$VERSION\"/; \$done=1 }" Cargo.toml
      - name: Build cargo-reclaim binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          chmod +x cargo-reclaim
          tar czf cargo-reclaim-${{ needs.validate-version.outputs.version }}-${{ matrix.label }}.tar.gz cargo-reclaim
          ls -lh cargo-reclaim-*.tar.gz
      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          $version = "${{ needs.validate-version.outputs.version }}"
          $label = "${{ matrix.label }}"
          Compress-Archive -Path cargo-reclaim.exe -DestinationPath "cargo-reclaim-$version-$label.zip"
          ls cargo-reclaim-*.zip
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.label }}
          path: |
            target/${{ matrix.target }}/release/cargo-reclaim-*.tar.gz
            target/${{ matrix.target }}/release/cargo-reclaim-*.zip
          retention-days: 1

  github-release:
    name: Create GitHub Release
    needs: [validate-version, build-binaries, publish-crate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          pattern: binaries-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: cargo-reclaim ${{ needs.validate-version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.validate-version.outputs.is_prerelease == 'true' }}
          files: artifacts/*
          fail_on_unmatched_files: true
